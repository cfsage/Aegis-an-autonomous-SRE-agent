steps:
  # Backend — Build and deploy to Cloud Run
  - id: 'build-backend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aegis-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aegis-backend:latest'
      - './backend'

  - id: 'push-backend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/aegis-backend:$COMMIT_SHA'
    waitFor: ['build-backend']

  - id: 'deploy-backend'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'aegis-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aegis-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
    waitFor: ['push-backend']

images:
  - 'gcr.io/$PROJECT_ID/aegis-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/aegis-backend:latest'

timeout: '600s'
